<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الشخصي | تصميم وتطوير</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; scroll-behavior: smooth; }
        body { background-color: #0f172a; color: #f8fafc; }
        a { text-decoration: none; color: inherit; }

        /* شريط التنقل */
        header {
            background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #1e293b;
        }
        .logo { font-size: 22px; font-weight: bold; color: #38bdf8; }
        nav ul { display: flex; list-style: none; gap: 25px; }
        nav ul li a { font-size: 16px; transition: color 0.3s; }
        nav ul li a:hover { color: #38bdf8; }

        /* القسم الرئيسي */
        .hero {
            padding: 100px 8%; display: flex; flex-direction: column; align-items: center; text-align: center;
            background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 70%);
        }
        .hero h1 { font-size: 42px; margin-bottom: 15px; }
        .hero h1 span { color: #38bdf8; }
        .hero p { font-size: 18px; color: #94a3b8; max-width: 600px; margin-bottom: 30px; }
        .btn {
            background-color: #38bdf8; color: #0f172a; padding: 12px 30px; font-weight: bold; border-radius: 8px;
            transition: all 0.3s ease; display: inline-block; cursor: pointer; border: none;
        }
        .btn:hover { background-color: #0ea5e9; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }

        /* العناوين العامة */
        .section-title { font-size: 32px; margin-bottom: 40px; text-align: center; position: relative; }
        .section-title::after { content: ''; display: block; width: 60px; height: 4px; background: #38bdf8; margin: 10px auto 0; border-radius: 2px; }

        /* قسم الخدمات */
        .services { padding: 80px 8%; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .service-card {
            background-color: #1e293b; padding: 40px 20px; border-radius: 12px;
            transition: transform 0.3s, border-color 0.3s; border: 1px solid #334155; text-align: center;
        }
        .service-card:hover { transform: translateY(-10px); border-color: #38bdf8; }
        .service-card i { font-size: 40px; color: #38bdf8; margin-bottom: 20px; }
        .service-card h3 { font-size: 22px; margin-bottom: 15px; }
        .service-card p { color: #94a3b8; font-size: 15px; line-height: 1.6; }

        /* قسم معرض الأعمال المعدّل */
        .portfolio { padding: 80px 8%; background-color: #0f172a; }
        .portfolio-filters { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .filter-btn {
            background-color: #1e293b; color: #f8fafc; border: 1px solid #334155;
            padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: all 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { background-color: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .project-card {
            background-color: #1e293b; border-radius: 12px; overflow: hidden;
            border: 1px solid #334155; transition: transform 0.3s;
        }
        .project-card:hover { transform: scale(1.03); }
        .project-img {
            height: 220px; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .project-img img {
            width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s;
        }
        .project-card:hover .project-img img { transform: scale(1.1); }
        
        .project-info { padding: 20px; }
        .project-info h3 { font-size: 20px; margin-bottom: 10px; }
        .project-info p { color: #94a3b8; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        .project-link { color: #38bdf8; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; }

        /* قسم تواصل معي */
        .contact { padding: 80px 8%; background-color: #0b111e; }
        .contact-container { display: flex; flex-wrap: wrap; gap: 50px; max-width: 1100px; margin: 0 auto; }
        .contact-info { flex: 1; min-width: 300px; }
        .contact-info h3 { font-size: 24px; margin-bottom: 15px; color: #38bdf8; }
        .contact-info p { color: #94a3b8; margin-bottom: 30px; line-height: 1.6; }
        .social-links { display: flex; gap: 15px; }
