<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الذكي - نظام السلة الكامل</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #f4f6f9; color: #333; }
        
        /* شريط التنقل */
        header {
            background-color: #fff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .cart-icon { position: relative; font-size: 22px; cursor: pointer; color: #27ae60; padding: 5px; }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background-color: #e74c3c; color: white; font-size: 12px;
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* قسم الترحيب */
        .hero { background: linear-gradient(135deg, #2c3e50, #3498db); color: white; text-align: center; padding: 40px 20px; }
        
        /* شبكة المنتجات */
        .products-container {
            max-width: 1200px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px;
        }
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; text-align: center; padding: 15px; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 180px; border-radius: 6px; background-color: #eee; display: flex; align-items: center; justify-content: center; color: #888; margin-bottom: 15px;}
        .product-title { font-size: 18px; margin-bottom: 10px; }
        .product-price { color: #27ae60; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .add-btn { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 15px; }
        .add-btn:hover { background-color: #219150; }

        /* نافذة السلة الجانبية (Modal) */
        .cart-modal {
            position: fixed; top: 0; left: -400px; width: 380px; height: 100%;
            background: white; box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            z-index: 1000; transition: left 0.3s ease; padding: 20px;
            display: flex; flex-direction: column;
        }
        .cart-modal.open { left: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        .close-cart { font-size: 24px; cursor: pointer; color: #e74c3c; }
        
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f1f1f1; }
        .cart-item-info h4 { font-size: 14px; text-align: right; }
        .cart-item-info span { color: #27ae60; font-size: 13px; }
        .remove-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; }

        .cart-footer { border-top: 2px solid #eee; padding-top: 15px; }
        .total-price { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .checkout-btn { background-color: #3498db; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .checkout-btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-shop"></i> متجري الذكي</div>
        <div class="cart-icon" onclick="toggleCart()">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>

    <section class="hero">
        <h1>مرحباً بك في متجرك الجديد! 🛒</h1>
        <p>أضف المنتجات واضغط على السلة لتراها تفتح وتتحرك ديناميكياً.</p>
    </section>

    <main class="products-container">
        <div class="product-card">
            <div class="product-img"><i class="fa-solid fa-headphones fa-2x"></i></div>
            <h3 class="product-title">سماعة لاسلكية ذكية</h3>
            <div class="product-price">25000 د.ع</div>
            <button class="add-btn" onclick="addToCart('سماعة لاسلكية ذكية', 25000)">إضافة للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-img"><i class="fa-solid fa-clock fa-2x"></i></div>
            <h3 class="product-title">ساعة رقمية ذكية</h3>
            <div class="product-price">45000 د.ع</div>
            <button class="add-btn" onclick="addToCart('ساعة رقمية ذكية', 45000)">إضافة للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-img"><i class="fa-solid fa-bolt fa-2x"></i></div>
            <h3 class="product-title">شاحن سريع بقوة 65 واط</h3>
            <div class="product-price">15000 د.ع</div>
            <button class="add-btn" onclick="addToCart('شاحن سريع بقوة 65 واط', 15000)">إضافة للسلة</button>
        </div>
    </main>

    <div class="cart-modal" id="cart-modal">
        <div class="cart-header">
            <h3><i class="fa-solid fa-cart-shopping"></i> سلة المشتريات</h3>
            <i class="fa-solid fa-xmark close-cart" onclick="toggleCart()"></i>
        </div>
        
        <div class="cart-items" id="cart-items"></div>

        <div class="cart-footer">
            <div class="total-price">
                <span>الإجمالي:</span>
                <span id="total-amount">0 د.ع</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">إتمام عملية الشراء</button>
        </div>
    </div>

    <script>
        let cart = [];

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('open');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = ''; 

            let total = 0;
            cart.forEach((item, index) => {
                total += item.price;
                const itemHTML = `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <span>${item.price.toLocaleString()} د.ع</span>
                        </div>
                        <button class="remove-btn" onclick="removeFromCart(${index})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                cartItemsContainer.innerHTML += itemHTML;
            });

            document.getElementById('total-amount').innerText = total.toLocaleString() + ' د.ع';
        }

        function checkout() {
            if(cart.length === 0) {
                alert('السلة فارغة حالياً!');
                return;
            }
            alert('شكرًا لشرائك! 🎉');
            cart = [];
            updateCartUI();
            toggleCart();
        }
    </script>
</body>
</html>
