<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الإلكتروني - العرض والشراء</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* تنسيقات عامة وسريعة لتبدأ بشكل أنيق */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
        }
        /* شريط التنقل */
        header {
            background-color: #fff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }
        .cart-icon {
            position: relative;
            font-size: 22px;
            cursor: pointer;
            color: #27ae60;
        }
        .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #e74c3c;
            color: white;
            font-size: 12px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* قسم الترحيب */
        .hero {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            text-align: center;
            padding: 60px 20px;
        }
        .hero h1 { margin-bottom: 10px; }
        
        /* شبكة المنتجات */
        .products-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            text-align: center;
            padding: 15px;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 6px;
            background-color: #eee; /* مؤقت حتى تضع صورك */
        }
        .product-title {
            font-size: 18px;
            margin: 15px 0 10px;
        }
        .product-price {
            color: #27ae60;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .add-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            transition: background 0.2s;
        }
        .add-btn:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-shop"></i> متجري الذكي</div>
        <div class="cart-icon">
            <i class="fa-solid fa-basket-shopping"></i>
            <span class="cart-count" id="cart-count">0</span>
        </div>
    </header>

    <section class="hero">
        <h1>أهلاً بك في متجرنا الإلكتروني</h1>
        <p>اكتشف أفضل المنتجات بأقل الأسعار</p>
    </section>

    <main class="products-container">
        
        <div class="product-card">
            <div class="product-img" style="display:flex; align-items:center; justify-content:center; color:#888;">صورة المنتج 1</div>
            <h3 class="product-title">سماعة لاسلكية ذكية</h3>
            <div class="product-price">25,000 د.ع</div>
            <button class="add-btn" onclick="addToCart()">إضافة للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-img" style="display:flex; align-items:center; justify-content:center; color:#888;">صورة المنتج 2</div>
            <h3 class="product-title">ساعة رقمية مقاومة للماء</h3>
            <div class="product-price">45,000 د.ع</div>
            <button class="add-btn" onclick="addToCart()">إضافة للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-img" style="display:flex; align-items:center; justify-content:center; color:#888;">صورة المنتج 3</div>
            <h3 class="product-title">شاحن سريع بقوة 65 واط</h3>
            <div class="product-price">15,000 د.ع</div>
            <button class="add-btn" onclick="addToCart()">إضافة للسلة</button>
        </div>

    </main>

    <script>
        // برمجة بسيطة جداً ومبدئية لعداد السلة
        let count = 0;
        function addToCart() {
            count++;
            document.getElementById('cart-count').innerText = count;
            alert('تم إضافة المنتج إلى السلة بنجاح! 🎉');
        }
    </script>
</body>
</html>
